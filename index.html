<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Puisano360 - Login</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 350px; text-align: center; border-top: 6px solid #004a99; }
        h2 { color: #004a99; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .login-btn { width: 100%; padding: 12px; background: #004a99; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 15px; }
        .error { color: red; font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Puisano360 Login</h2>
        <p>Enter your credentials to access the portal.</p>
        
        <input type="text" id="username" placeholder="Username (Try: admin)">
        <input type="password" id="password" placeholder="Password (Try: 1234)">
        
        <button class="login-btn" onclick="checkLogin()">Login</button>
        
        <div id="errorMsg" class="error">Invalid username or password!</div>
    </div>

    <script>
        function checkLogin() {
            // Getting values from the boxes
            var user = document.getElementById('username').value;
            var pass = document.getElementById('password').value;

            // Simple logic check
            if (user === "admin" && pass === "1234") {
                // This MUST match your dashboard filename on GitHub
                window.location.href = "dashboard.html";
            } else {
                // Show error if wrong
                document.getElementById('errorMsg').style.display = 'block';
            }
        }
    </script>

</body>
</html>
