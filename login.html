<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Puisano360 - Login</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        h2 { color: #004a99; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .login-btn { width: 100%; padding: 12px; background: #004a99; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .login-btn:hover { background: #003366; }
        .error { color: red; font-size: 14px; display: none; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Puisano360 Login</h2>
        <p>Enter your credentials to access the portal.</p>
        <input type="text" id="username" placeholder="Username (Try: admin)">
        <input type="password" id="password" placeholder="Password (Try: 1234)">
        <button class="login-btn" onclick="checkLogin()">Login</button>
        <div id="errorMsg" class="error">Invalid username or password!</div>
    </div>

    <script>
        function checkLogin() {
            var user = document.getElementById('username').value;
            var pass = document.getElementById('password').value;

            // Simple logic for your demo
            if (user === "admin" && pass === "1234") {
                window.location.href = "index.html"; // Takes them to the dashboard
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        }
    </script>
</body>
</html>
